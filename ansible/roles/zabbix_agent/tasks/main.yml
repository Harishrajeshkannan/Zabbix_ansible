---
- name: Validate required install inputs
  ansible.builtin.assert:
    that:
      - version is defined
      - version | string | length > 0
      - serverIP is defined
      - serverIP | string | length > 0
      - hostname is defined
      - hostname | string | length > 0
    fail_msg: "version, serverIP and hostname are required"

- name: Validate semantic version format
  ansible.builtin.assert:
    that:
      - version is match('^\\d+\\.\\d+\\.\\d+$')
    fail_msg: "version must be in format X.Y.Z"

- name: Derive version/channel values
  ansible.builtin.set_fact:
    zabbix_major_minor: "{{ version | regex_replace('^(\\d+\\.\\d+)\\..*$', '\\1') }}"
    zabbix_repo_base: "https://repo.zabbix.com/zabbix/{{ version | regex_replace('^(\\d+\\.\\d+)\\..*$', '\\1') }}/stable/rhel/{{ ansible_distribution_major_version }}/x86_64"

- name: Query repository to find exact zabbix-agent2 RPM filename
  ansible.builtin.shell: |
    curl -k -s "{{ zabbix_repo_base }}/" | grep -oP 'href="\Kzabbix-agent2-[0-9][^"]*\.el{{ ansible_distribution_major_version }}\.x86_64\.rpm' | sort -V | tail -1
  register: zabbix_agent2_filename
  changed_when: false

- name: Validate zabbix-agent2 RPM was found
  ansible.builtin.assert:
    that:
      - zabbix_agent2_filename.stdout | length > 0
    fail_msg: "Could not find zabbix-agent2 RPM in repository at {{ zabbix_repo_base }}"

- name: Set zabbix_agent2_rpm URL
  ansible.builtin.set_fact:
    zabbix_agent2_rpm: "{{ zabbix_repo_base }}/{{ zabbix_agent2_filename.stdout }}"

- name: Install Zabbix Agent 2 package
  ansible.builtin.dnf:
    name: "{{ zabbix_agent2_rpm }}"
    state: present
    disable_gpg_check: true

- name: Deploy zabbix_agent2 configuration
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: restart zabbix agent service

- name: Ensure Zabbix Agent service is enabled and started
  ansible.builtin.service:
    name: zabbix-agent2
    state: started
    enabled: true
