---
- name: Validate required install inputs
  ansible.builtin.assert:
    that:
      - version is defined
      - version | string | length > 0
      - serverIP is defined
      - serverIP | string | length > 0
      - hostname is defined
      - hostname | string | length > 0
    fail_msg: "version, serverIP and hostname are required"

- name: Validate semantic version format
  ansible.builtin.assert:
    that:
      - version is match('^\\d+\\.\\d+\\.\\d+$')
    fail_msg: "version must be in format X.Y.Z"

- name: Derive version/channel values
  ansible.builtin.set_fact:
    zabbix_major_minor: "{{ version | regex_replace('^(\\d+\\.\\d+)\\..*$', '\\1') }}"
    zabbix_repo_rpm: "https://repo.zabbix.com/zabbix/{{ version | regex_replace('^(\\d+\\.\\d+)\\..*$', '\\1') }}/rhel/{{ ansible_distribution_major_version }}/x86_64/zabbix-release-latest-{{ version | regex_replace('^(\\d+\\.\\d+)\\..*$', '\\1') }}.el{{ ansible_distribution_major_version }}.noarch.rpm"

- name: Install or update Zabbix repository package
  ansible.builtin.dnf:
    name: "{{ zabbix_repo_rpm }}"
    state: present
    disable_gpg_check: true

- name: Refresh package metadata
  ansible.builtin.command: dnf clean all
  changed_when: false

- name: Install Zabbix Agent 2 package
  ansible.builtin.dnf:
    name: zabbix-agent2
    state: present

- name: Deploy zabbix_agent2 configuration
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: restart zabbix agent service

- name: Ensure Zabbix Agent service is enabled and started
  ansible.builtin.service:
    name: zabbix-agent2
    state: started
    enabled: true
